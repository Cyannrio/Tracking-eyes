<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tracking Eyes</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.eye{
  width:200px;
  height:200px;
  background:white;
  border-radius:50%;
  position:relative;
  margin:40px;
}

.pupil{
  width:80px;
  height:80px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:60px;
  left:60px;
  transition: transform 0.05s linear;
}
</style>

</head>

<body>

<div class="eye">
  <div class="pupil"></div>
</div>

<div class="eye">
  <div class="pupil"></div>
</div>


<script>

const eyes = document.querySelectorAll(".eye")

function movePupils(clientX, clientY){

  eyes.forEach((eye)=>{

    const pupil = eye.querySelector(".pupil")

    const rect = eye.getBoundingClientRect()

    const eyeCenterX = rect.left + rect.width/2
    const eyeCenterY = rect.top + rect.height/2

    const dx = clientX - eyeCenterX
    const dy = clientY - eyeCenterY

    const angle = Math.atan2(dy,dx)

    const distance = rect.width * 0.18

    const x = Math.cos(angle) * distance
    const y = Math.sin(angle) * distance

    pupil.style.transform = `translate(${x}px, ${y}px)`

  })

}


window.addEventListener("mousemove",(e)=>{
  movePupils(e.clientX,e.clientY)
})


window.addEventListener("touchmove",(e)=>{
  const touch = e.touches[0]
  movePupils(touch.clientX,touch.clientY)
})

window.addEventListener("touchstart",(e)=>{
  const touch = e.touches[0]
  movePupils(touch.clientX,touch.clientY)
})

</script>

</body>
</html>
<script>
function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

function moveByNormalized(nx, ny){
  // nx, ny in range [-1, 1]
  eyes.forEach((eye)=>{
    const pupil = eye.querySelector(".pupil");
    const rect = eye.getBoundingClientRect();
    const distance = rect.width * 0.18;
    const x = clamp(nx, -1, 1) * distance;
    const y = clamp(ny, -1, 1) * distance;
    pupil.style.transform = `translate(${x}px, ${y}px)`;
  });
}

// iOS requires permission for motion sensors sometimes
async function enableMotion(){
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    const res = await DeviceOrientationEvent.requestPermission();
    if (res !== "granted") return;
  }

  window.addEventListener("deviceorientation", (e)=>{
    // gamma: left/right tilt (-90..90)
    // beta: front/back tilt (-180..180)
    const nx = (e.gamma ?? 0) / 45;  // normalize
    const ny = (e.beta ?? 0) / 45;
    moveByNormalized(nx, ny);
  });
}

// Tap anywhere once to enable motion on iOS
window.addEventListener("click", enableMotion, { once: true });
window.addEventListener("touchstart", enableMotion, { once: true });
</script>
