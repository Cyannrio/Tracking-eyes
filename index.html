<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Eyes</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Hidden video for camera feed -->
  <video id="video" playsinline muted autoplay></video>

  <!-- The only thing visible -->
  <div id="stage" aria-label="Eyes">
    <div class="eye" id="eyeL">
      <div class="iris"></div>
      <div class="pupil"></div>
      <div class="glint"></div>
      <div class="lid"></div>
    </div>

    <div class="eye" id="eyeR">
      <div class="iris"></div>
      <div class="pupil"></div>
      <div class="glint"></div>
      <div class="lid"></div>
    </div>
  </div>

  <!-- Tap required on iOS to allow camera -->
  <button id="startBtn">Start Camera</button>

  <div id="status" role="status">Tap “Start Camera”</div>

  <script type="module" src="./script.js"></script>
</body>
</html>
