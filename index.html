<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tracking Eyes (Camera)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <div class="title">
      <h1>Eyes Follow You</h1>
      <p id="status">Tap “Start Camera” to begin.</p>
      <button id="startBtn">Start Camera</button>
    </div>

    <!-- Your eyes (you can style these to look less cartoony in CSS) -->
    <div class="eyesWrap" aria-hidden="true">
      <div class="eye" id="eyeL"><div class="pupil"></div><div class="gloss"></div></div>
      <div class="eye" id="eyeR"><div class="pupil"></div><div class="gloss"></div></div>
    </div>

    <!-- Hidden camera feed -->
    <video id="cam" playsinline autoplay muted></video>

    <!-- Optional: debugging overlay (kept hidden by default) -->
    <canvas id="debug"></canvas>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
